services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build: ./frontend

  postgres:
    image: postgres:17
    container_name: stock_dashboard_db
    environment:
      POSTGRES_DB: stock_dashboard
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
  
  nginx:
    image: nginx:latest
    ports:
     - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data: