services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    expose:
      - "8000"

  frontend:
    build: ./frontend
    volumes:
      - frontend_dist:/app/dist

  postgres:
    image: postgres:17
    container_name: stock_dashboard_db
    environment:
      POSTGRES_DB: stock_dashboard
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
  
  nginx:
    image: nginx:latest
    ports:
     - "80:80"
    volumes:
     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
     - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  frontend_dist: